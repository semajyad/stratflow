<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 68">
  <!-- "ThreePoints" wordmark — thin weight, tracking -->
  <text x="120" y="32"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="26"
        font-weight="300"
        fill="#1a1a1a"
        text-anchor="middle"
        letter-spacing="1.5">ThreePoints</text>

  <!-- Hairline rule -->
  <line x1="6" y1="40" x2="234" y2="40" stroke="#bbbbbb" stroke-width="0.7"/>

  <!-- Three dots: navy · hollow · red -->
  <circle cx="100" cy="55" r="5" fill="#1a3a8f"/>
  <circle cx="120" cy="55" r="5" fill="none" stroke="#aaaaaa" stroke-width="1.2"/>
  <circle cx="140" cy="55" r="5" fill="#cc2020"/>
</svg>
