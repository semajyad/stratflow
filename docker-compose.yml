services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - PHP_MEMORY_LIMIT=256M
    networks:
      - stratflow

  nginx:
    image: nginx:alpine
    ports:
      - "8890:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - stratflow

  quality-worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - PHP_MEMORY_LIMIT=256M
    networks:
      - stratflow
    # Run the quality scorer every 2 minutes via a simple shell loop.
    # 'sleep 120' keeps CPU near zero between runs.
    command: >
      sh -c "while true; do php /var/www/html/bin/score_quality.php --limit=25; sleep 120; done"
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: stratflow
      MYSQL_USER: stratflow
      MYSQL_PASSWORD: stratflow_secret
    ports:
      - "3307:3306"
    volumes:
      - ./docker/mysql-data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - stratflow

  # ── GrowthBook — feature flags & A/B testing ──────────────────────────────
  mongo:
    image: mongo:7.0
    volumes:
      - ./docker/mongo-data:/data/db
    networks:
      - stratflow
    # No ports exposed — only GrowthBook needs direct access

  growthbook:
    image: growthbook/growthbook:latest
    ports:
      - "3100:3100"   # GrowthBook UI
      - "3101:3101"   # GrowthBook API (SDK connections)
    environment:
      MONGODB_URI: mongodb://mongo:27017/growthbook
      APP_ORIGIN: http://localhost:3100
      API_HOST: http://localhost:3101
    depends_on:
      - mongo
    volumes:
      - ./docker/growthbook-uploads:/usr/local/src/app/packages/back-end/uploads
    networks:
      - stratflow

networks:
  stratflow:
    driver: bridge
