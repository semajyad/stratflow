[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo_mysql", "php84Extensions.mysqlnd", "php84Extensions.zip", "php84Extensions.gd", "php84Extensions.mbstring", "php84Packages.composer"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader"]

[start]
cmd = "php scripts/init-db.php 2>&1 || true; php -S 0.0.0.0:${PORT:-8080} -t public public/router.php"
