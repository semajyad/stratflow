# CodeRabbit configuration for StratFlow

language: en-US
tone_instructions: "Be direct and technical. Skip pleasantries. Lead with the issue. Flag security findings clearly without hedging."
early_access: false

reviews:
  profile: assertive
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: true

  path_filters:
    - "!vendor/**"
    - "!public/assets/css/**"
    - "!*.lock"
    - "!tests/Playwright/__screenshots__/**"
    - "!.vexp/**"

  path_instructions:
    - path: "src/Controllers/**"
      instructions: |
        PHP 8.4 MVC controller in a multi-tenant SaaS. Flag as CRITICAL:
        - Every POST handler must call $this->verifyCsrf() as its FIRST line (except verified webhooks)
        - Every query on a tenant table (users, projects, documents, work_items, risks, stories, sprints) must filter by org_id
        - All DB queries must use PDO prepared statements — no string interpolation or concatenation in SQL
        - Never echo raw user input — all output must use htmlspecialchars($v, ENT_QUOTES, 'UTF-8')
        - No die($e->getMessage()) or raw exception output to the browser
        - Inactive or unauthorised users must be denied — fail closed, never open

    - path: "src/Models/**"
      instructions: |
        Model layer. Flag as CRITICAL:
        - All queries must be parameterised — no string interpolation
        - Every tenant-scoped query must include org_id in WHERE
        - Never surface raw DB errors to callers — throw typed exceptions

    - path: "src/Services/**"
      instructions: |
        Service layer. Flag as CRITICAL:
        - Never log secrets, tokens, API keys, or raw provider API responses
        - org_id must be passed explicitly — never assumed from global state
        - External HTTP calls must have timeout=30 and retry logic on 5xx
        - Stripe event handlers must check stripe_events table for idempotency before processing

    - path: "src/Controllers/WebhookController.php"
      instructions: |
        Stripe webhook handler. Flag as CRITICAL:
        - Signature verification via constructWebhookEvent() must be the very first action
        - Every event type must check stripe_events for idempotency before processing
        - This endpoint is exempt from CSRF (external POST from Stripe)

    - path: "src/Middleware/**"
      instructions: |
        Auth/session middleware. Flag as CRITICAL:
        - Must fail closed — deny on any ambiguous auth state
        - Regenerate session ID on privilege escalation

    - path: "templates/**"
      instructions: |
        PHP templates. Flag as CRITICAL:
        - Every user-controlled value must be wrapped in htmlspecialchars(..., ENT_QUOTES, 'UTF-8')
        - No inline event handlers (onclick=, onload=) — use delegated JS in app.js
        - Every <input>, <select>, <textarea> must have an associated <label for="..."> or aria-label
        - Every state-changing form needs <input type="hidden" name="_csrf_token" ...>

    - path: "public/assets/js/**"
      instructions: |
        Client-side JS. Flag as CRITICAL:
        - No innerHTML assignments with user-controlled data — use textContent or DOM methods
        - No eval() or Function() constructor
        - No hardcoded secrets or API keys

    - path: "database/**"
      instructions: |
        Schema/migrations. Flag:
        - New NOT NULL columns on existing tables must have a DEFAULT — never a bare NOT NULL addition
        - New tables must include created_at and updated_at
        - Foreign keys must be declared explicitly

    - path: "tests/**"
      instructions: |
        PHPUnit/Playwright tests. Check:
        - Tests must use isolated test DB credentials, never production config
        - Each test must clean up its own state — no inter-test dependencies
        - New src/**/*.php files should have a corresponding test file

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

chat:
  auto_reply: true
