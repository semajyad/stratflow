name: Staging Smoke

on:
  schedule:
    # Nightly at 12:00 UTC = 00:00 NZT (midnight)
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Playwright smoke — staging
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tests/Playwright/package-lock.json

      - name: Install Playwright
        working-directory: tests/Playwright
        run: npm ci

      - name: Install Chromium browser
        working-directory: tests/Playwright
        run: npx playwright install chromium --with-deps

      - name: Run fast smoke against staging
        working-directory: tests/Playwright
        env:
          CI: 'true'
          BASE_URL: ${{ secrets.STAGING_URL }}
          E2E_EMAIL: ${{ secrets.ZAP_SMOKE_EMAIL }}
          E2E_PASSWORD: ${{ secrets.ZAP_SMOKE_PASSWORD }}
        run: npx playwright test --project=fast fast/healthz.spec.js fast/smoke.spec.js

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: smoke-staging-artifacts
          path: tests/Playwright/test-results/
          retention-days: 3

      - name: Write nightly status
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json, os
          status = "fail" if os.environ.get("JOB_STATUS") != "success" else "pass"
          payload = {
              "job": "smoke",
              "status": status,
              "metric": None,
              "findings_url": f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}" if status == "fail" else None,
              "run_id": os.environ["GITHUB_RUN_ID"],
          }
          with open("nightly-status.json", "w") as f:
              json.dump(payload, f)
          PYEOF
        env:
          JOB_STATUS: ${{ job.status }}

      - name: Upload nightly status artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: nightly-status-smoke
          path: nightly-status.json
          retention-days: 7

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/ntfy-notify
        with:
          title: "StratFlow CI — staging smoke FAILED"
          body: "Playwright smoke test against staging failed. Run ${{ github.run_id }}"
          priority: urgent
          tags: "warning,ci,e2e,staging"
          click_url: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ntfy_url: ${{ secrets.NTFY_URL }}
          ntfy_topic: ${{ secrets.NTFY_TOPIC }}
