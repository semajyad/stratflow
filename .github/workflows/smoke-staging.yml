name: Staging Smoke

on:
  schedule:
    # Nightly at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  smoke:
    name: Playwright smoke — staging
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tests/Playwright/package-lock.json

      - name: Install Playwright
        working-directory: tests/Playwright
        run: npm ci

      - name: Install Chromium browser
        working-directory: tests/Playwright
        run: npx playwright install chromium --with-deps

      - name: Run fast smoke against staging
        working-directory: tests/Playwright
        env:
          CI: 'true'
          BASE_URL: ${{ secrets.STAGING_URL }}
          E2E_EMAIL: ${{ secrets.ZAP_SMOKE_EMAIL }}
          E2E_PASSWORD: ${{ secrets.ZAP_SMOKE_PASSWORD }}
        run: npx playwright test --project=fast

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-staging-artifacts
          path: tests/Playwright/test-results/
          retention-days: 3
