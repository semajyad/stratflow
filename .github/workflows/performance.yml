name: Performance Tests (k6)

# Nightly k6 load test against the staging environment.
# Thresholds: p95 response time < 800ms, error rate < 1%.
# A threshold breach fails this workflow but does NOT block merges
# (advisory only — prevents perf regressions going unnoticed).
#
# Required GitHub Variable: APP_URL_STAGING (defaults to Railway test URL)
# k6 scripts: tests/performance/k6-baseline-run.js

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Target URL for load test (must NOT be production)"
        required: false
        default: ""
        type: string
  schedule:
    # 12:30 UTC daily = ~12:30 am NZT — after mutation tests, before Shannon
    - cron: "30 12 * * *"

concurrency:
  group: performance-tests
  cancel-in-progress: true

permissions: read-all

jobs:
  k6:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # to commit summary-latest.json

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve and guard target URL
        id: target
        run: |
          URL="${{ inputs.target_url || vars.APP_URL_STAGING || 'https://stratflow-app-test.up.railway.app' }}"
          PROD_HOSTNAMES=("stratflow.io" "app.stratflow.io")
          for PROD in "${PROD_HOSTNAMES[@]}"; do
            if echo "$URL" | grep -qiF "$PROD"; then
              echo "::error::Performance test target '$URL' is a production hostname. Set APP_URL_STAGING to a non-prod URL."
              exit 1
            fi
          done
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Load test target: $URL"

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -q
          sudo apt-get install -y k6

      - name: Run k6 baseline
        env:
          BASE_URL: ${{ steps.target.outputs.url }}
        run: |
          k6 run \
            --env BASE_URL="$BASE_URL" \
            --out json=tests/performance/results-${{ github.run_id }}.json \
            --summary-export tests/performance/summary-latest.json \
            tests/performance/k6-baseline-run.js
        continue-on-error: true   # capture exit code without failing immediately

      - name: Check thresholds
        run: |
          if [ -f tests/performance/summary-latest.json ]; then
            python3 - <<'EOF'
          import json, sys
          summary = json.load(open('tests/performance/summary-latest.json'))
          metrics  = summary.get('metrics', {})

          p95 = metrics.get('http_req_duration', {}).get('values', {}).get('p(95)', None)
          err = metrics.get('http_req_failed',   {}).get('values', {}).get('rate',   None)

          ok = True
          if p95 is not None:
              print(f'p95 response time: {p95:.0f}ms (threshold: 800ms)')
              if p95 > 800:
                  print('::error::p95 response time exceeds 800ms threshold')
                  ok = False
          if err is not None:
              pct = err * 100
              print(f'Error rate: {pct:.2f}% (threshold: 1%)')
              if err > 0.01:
                  print('::error::Error rate exceeds 1% threshold')
                  ok = False

          sys.exit(0 if ok else 1)
          EOF
          else
            echo "::warning::summary-latest.json not found — k6 may have failed to run"
            exit 1
          fi

      - name: Upload k6 results artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: k6-results-${{ github.run_id }}
          path: tests/performance/
          retention-days: 30

      - name: Write nightly status
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json, os
          p95 = None
          err = None
          try:
              summary = json.load(open("tests/performance/summary-latest.json"))
              metrics = summary.get("metrics", {})
              p95 = metrics.get("http_req_duration", {}).get("values", {}).get("p(95)")
              err = metrics.get("http_req_failed", {}).get("values", {}).get("rate")
          except Exception:
              pass
          failed = os.environ.get("JOB_STATUS") != "success"
          perf_fail = (p95 is not None and p95 > 800) or (err is not None and err > 0.01)
          status = "fail" if (failed or perf_fail) else "pass"
          payload = {
              "job": "perf",
              "status": status,
              "metric": {"p95_ms": round(p95) if p95 else None},
              "findings_url": f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}" if status == "fail" else None,
              "run_id": os.environ["GITHUB_RUN_ID"],
          }
          with open("nightly-status.json", "w") as f:
              json.dump(payload, f)
          PYEOF
        env:
          JOB_STATUS: ${{ job.status }}

      - name: Upload nightly status artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: nightly-status-perf
          path: nightly-status.json
          retention-days: 7

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/ntfy-notify
        with:
          title: "StratFlow CI — k6 performance FAILED"
          body: "k6 baseline thresholds breached. Run ${{ github.run_id }}"
          priority: high
          tags: "warning,ci,perf"
          click_url: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ntfy_url: ${{ secrets.NTFY_URL }}
          ntfy_topic: ${{ secrets.NTFY_TOPIC }}

      - name: Append to performance history
        if: always()
        run: |
          DATE=$(date -u '+%Y-%m-%d')
          mkdir -p tests/performance/history
          # Copy summary to a date-stamped file (never overwrite, append runs)
          DEST="tests/performance/history/${DATE}.json"
          if [ -f tests/performance/summary-latest.json ]; then
            cp tests/performance/summary-latest.json "$DEST"
            echo "Archived to $DEST"
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/performance/summary-latest.json tests/performance/history/ || true
          # Clean up per-run JSON file before commit (it's captured in the artifact)
          git rm --ignore-unmatch tests/performance/results-*.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: k6 performance history ${DATE}"
            git push || echo "::warning::Could not push performance history to main (branch protection). Results preserved in artifacts."
          fi
