name: CodeQL Security Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday at 14:00 UTC
    - cron: "0 14 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze PHP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: php
          build-mode: none

      - name: Perform CodeQL Analysis
        id: codeql
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:php"

      # -----------------------------------------------------------------------
      # Emit nightly-status artifact on scheduled runs only.
      # Schema matches other nightly workflows — consumed by morning-summary.
      # -----------------------------------------------------------------------
      - name: Emit nightly status artifact
        if: github.event_name == 'schedule'
        run: |
          STATUS="pass"
          if [[ "${{ job.status }}" != "success" ]]; then
            STATUS="fail"
          fi
          FINDINGS_URL="https://github.com/${{ github.repository }}/security/code-scanning"
          cat > nightly-status.json << EOF
          {
            "job": "codeql",
            "status": "${STATUS}",
            "metric": null,
            "findings_url": "${FINDINGS_URL}",
            "run_id": "${{ github.run_id }}"
          }
          EOF

      - name: Upload nightly status artifact
        if: github.event_name == 'schedule'
        uses: actions/upload-artifact@v4
        with:
          name: nightly-status
          path: nightly-status.json
          retention-days: 7
