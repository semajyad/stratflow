name: Self-heal PR branch

# Reusable workflow — invoked by tests.yml before the fast-path checks run.
# Detects and auto-fixes common PR branch issues so CI doesn't fail on
# administrative drift. Every action is idempotent (safe to run twice).
#
# Repairs:
#   1. composer.lock drifted from composer.json → regenerate and commit
#   2. phpstan-baseline.neon has stale (unmatched) entries → regenerate
#   3. PR branch is behind main → rebase onto main
#
# If the retry budget (default 2) is exhausted, the PR is labelled
# 'self-heal-failed' and a HIGH ntfy alert fires. The workflow exits 0
# so it doesn't shadow the real test failure.

# Explicit permissions at workflow level (restrict defaults; job overrides with write).
permissions: {}

on:
  workflow_call:
    inputs:
      pr_number:
        description: PR number to repair
        required: true
        type: number
      pr_branch:
        description: PR head branch name
        required: true
        type: string
      max_attempts:
        description: Maximum self-heal attempts
        required: false
        type: number
        default: 2
    secrets:
      gh_token:
        required: true
      anthropic_api_key:
        required: false
      ntfy_url:
        required: false
      ntfy_topic:
        required: false

  # Also allow direct trigger for manual repair
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to repair
        required: true
        type: number
      pr_branch:
        description: PR head branch name
        required: true
        type: string

jobs:
  self-heal:
    name: Self-heal PR #${{ inputs.pr_number }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Deduplicate: only one self-heal per PR branch at a time
    concurrency:
      group: self-heal-pr-${{ inputs.pr_number }}
      cancel-in-progress: true

    permissions:
      contents: write
      pull-requests: write

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: stratflow
          MYSQL_USER: stratflow
          MYSQL_PASSWORD: stratflow_secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ inputs.pr_branch }}
          fetch-depth: 0
          token: ${{ secrets.gh_token || secrets.GITHUB_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f  # v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql, zip, gd, mbstring, curl, mysqlnd
          coverage: none

      - name: Configure git
        run: |
          git config user.name "stratflow-ci[bot]"
          git config user.email "stratflow-ci[bot]@users.noreply.github.com"
          git remote set-url origin \
            "https://x-access-token:${{ secrets.gh_token || secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

      - name: Run self-heal repairs
        id: repair
        env:
          GH_TOKEN: ${{ secrets.gh_token || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
          PR_BRANCH: ${{ inputs.pr_branch }}
          MAX_ATTEMPTS: ${{ inputs.max_attempts || 2 }}
          NTFY_URL: ${{ secrets.ntfy_url || secrets.NTFY_URL }}
          NTFY_TOPIC: ${{ secrets.ntfy_topic || secrets.NTFY_TOPIC }}
        run: |
          set -euo pipefail

          CHANGES_COMMITTED=false
          COMMIT_MESSAGES=()

          # ── Fetch main for rebase check ──────────────────────────────────
          git fetch origin main --quiet

          # ── 1. Rebase onto main if behind ────────────────────────────────
          BEHIND=$(git rev-list --count HEAD..origin/main)
          if [ "$BEHIND" -gt 0 ]; then
            echo "Branch is $BEHIND commit(s) behind main — rebasing..."
            if git rebase origin/main; then
              echo "Rebase succeeded"
              COMMIT_MESSAGES+=("rebase onto main ($BEHIND commits)")
            else
              echo "::warning::Rebase conflict detected — cannot auto-resolve hand-written code conflicts"
              git rebase --abort 2>/dev/null || true
              # Post advisory comment; don't fail — let CI show the real error
              gh pr comment "$PR_NUMBER" --repo "$REPO" \
                --body "⚠️ Self-heal: branch has conflicts with main that require manual resolution." || true
            fi
          else
            echo "Branch is up to date with main"
          fi

          # ── 2. composer.lock drift check ─────────────────────────────────
          INSTALL_OUTPUT=$(composer install --no-interaction --prefer-dist 2>&1)
          if echo "$INSTALL_OUTPUT" | grep -qE "Warning.*The lock file is not up to date|Nothing to install.*but lock file|Lock file is out of date"; then
            echo "composer.lock is drifted — regenerating..."
            composer update --lock --no-interaction 2>&1
            if ! git diff --quiet composer.lock; then
              git add composer.lock
              git commit -m "chore: regen composer.lock (self-heal — was drifted from composer.json)"
              CHANGES_COMMITTED=true
              COMMIT_MESSAGES+=("regen composer.lock")
            fi
          else
            # Ensure vendor is ready for PHPStan step below
            composer install --no-interaction --prefer-dist --quiet 2>/dev/null || true
          fi

          # ── 3. PHPStan baseline stale entries ────────────────────────────
          if [ -f "phpstan-baseline.neon" ]; then
            # Run PHPStan and capture the "not matched" warning count
            NOT_MATCHED=$(vendor/bin/phpstan analyse \
              --memory-limit=512M --configuration=phpstan.neon --no-progress \
              --error-format=json 2>/dev/null \
              | python3 -c "
          import json, sys
          try:
              d = json.load(sys.stdin)
              # Count 'Ignored error pattern ...' not matched messages
              count = sum(1 for e in d.get('files', {}).get('', {}).get('messages', [])
                         if 'Ignored error pattern' in e.get('message','') and 'not matched' in e.get('message',''))
              print(count)
          except Exception:
              print(0)
          " 2>/dev/null || echo "0")

            if [ "${NOT_MATCHED:-0}" -gt 0 ]; then
              echo "PHPStan baseline has $NOT_MATCHED stale entries — regenerating..."
              vendor/bin/phpstan analyse \
                --memory-limit=512M --configuration=phpstan.neon \
                --generate-baseline=phpstan-baseline.neon \
                --no-progress 2>/dev/null || true

              if ! git diff --quiet phpstan-baseline.neon; then
                git add phpstan-baseline.neon
                git commit -m "chore: regen phpstan-baseline.neon (self-heal — $NOT_MATCHED stale entries)"
                CHANGES_COMMITTED=true
                COMMIT_MESSAGES+=("regen phpstan-baseline ($NOT_MATCHED stale entries)")
              fi
            fi
          fi

          # ── Push if any commits made ─────────────────────────────────────
          if [ "$CHANGES_COMMITTED" = "true" ] || [ "$BEHIND" -gt 0 ]; then
            echo "Pushing self-heal commits to $PR_BRANCH..."
            git push origin "$PR_BRANCH" --force-with-lease
            SUMMARY=$(IFS=', '; echo "${COMMIT_MESSAGES[*]:-rebase only}")
            echo "Self-heal complete: $SUMMARY"
            echo "healed=true" >> "$GITHUB_OUTPUT"
            echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"
          else
            echo "No drift detected — branch is clean"
            echo "healed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on PR if healed
        if: steps.repair.outputs.healed == 'true'
        env:
          GH_TOKEN: ${{ secrets.gh_token || secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ inputs.pr_number }} \
            --repo ${{ github.repository }} \
            --body "🔧 Self-heal applied: ${{ steps.repair.outputs.summary }}" || true

      - name: Notify and label on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.gh_token || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          NTFY_URL: ${{ secrets.ntfy_url || secrets.NTFY_URL }}
          NTFY_TOPIC: ${{ secrets.ntfy_topic || secrets.NTFY_TOPIC }}
        run: |
          gh pr edit ${{ inputs.pr_number }} \
            --add-label "self-heal-failed" --repo "$REPO" || true

          if [ -n "${NTFY_URL:-}" ] && [ -n "${NTFY_TOPIC:-}" ]; then
            curl -s \
              -H "Title: StratFlow self-heal failed: PR #${{ inputs.pr_number }}" \
              -H "Priority: high" \
              -H "Tags: warning,wrench" \
              -H "Click: https://github.com/$REPO/pull/${{ inputs.pr_number }}" \
              -d "Self-heal exhausted retries on PR #${{ inputs.pr_number }}. Manual intervention may be needed." \
              "$NTFY_URL/$NTFY_TOPIC" || true
          fi
