name: Pipeline Health Review

on:
  schedule:
    - cron: "0 18 * * 0"  # Every Sunday at 18:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  health-review:
    name: Weekly pipeline health review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Parse learnings and generate summary
        id: parse
        run: |
          python - <<'PYEOF'
          import json
          import os
          import re
          from pathlib import Path
          from datetime import date

          today = date.today().strftime("%Y-%m-%d")

          files = {
              "ci":       Path("docs/ci-learnings.md"),
              "security": Path("docs/security-learnings.md"),
              "tests":    Path("docs/test-learnings.md"),
          }

          ENTRY_RE = re.compile(
              r"^## \[(\d{4}-\d{2}-\d{2})\] (\w+) — (.+)$",
              re.MULTILINE,
          )
          FOLLOWUP_RE = re.compile(
              r"\*\*Follow-up:\*\* (.+?)(?=\n\n|\n\*\*|\Z)",
              re.DOTALL,
          )

          entries = []
          counts = {}

          for cat, path in files.items():
              if not path.exists():
                  counts[cat] = 0
                  continue
              text = path.read_text(encoding="utf-8")
              matches = ENTRY_RE.findall(text)
              counts[cat] = len(matches)

              # Extract full blocks for follow-up analysis
              blocks = re.split(r"^---$", text, flags=re.MULTILINE)
              for block in blocks:
                  m = ENTRY_RE.search(block)
                  if not m:
                      continue
                  entry_date, entry_cat, entry_title = m.groups()
                  fu_match = FOLLOWUP_RE.search(block)
                  follow_up = fu_match.group(1).strip() if fu_match else ""
                  entries.append({
                      "date": entry_date,
                      "category": entry_cat,
                      "title": entry_title.strip(),
                      "follow_up": follow_up,
                      "file": str(path),
                  })

          # Sort by date descending
          entries.sort(key=lambda e: e["date"], reverse=True)

          total = sum(counts.values())
          recent_3 = entries[:3]
          outstanding_followups = [
              e for e in entries
              if e["follow_up"] and e["follow_up"].lower() not in ("none.", "none", "")
          ]

          # Build issue body
          recent_lines = "\n".join(
              f"- [{e['date']}] **{e['category']}** — {e['title']}"
              for e in recent_3
          )

          if outstanding_followups:
              followup_lines = "\n".join(
                  f"- [{e['date']}] {e['title']}: {e['follow_up']}"
                  for e in outstanding_followups
              )
              suggested = "\n".join(
                  f"- Resolve follow-up: {e['title']}"
                  for e in outstanding_followups[:5]
              )
          else:
              followup_lines = "_None outstanding._"
              suggested = "_No action needed — all follow-ups resolved._"

          body = f"""## CI/CD Health Summary

          - **{total} total learnings recorded** (ci: {counts.get('ci', 0)}, security: {counts.get('security', 0)}, tests: {counts.get('tests', 0)})

          ### 3 Most Recent Issues

          {recent_lines}

          ### Follow-ups Outstanding

          {followup_lines}

          ## Suggested Improvements

          {suggested}

          ---
          _Generated by pipeline-health-review workflow on {today}._
          """

          # Dedent the heredoc
          body = "\n".join(line.lstrip() if line.startswith("          ") else line for line in body.splitlines())

          output = {
              "today": today,
              "total": total,
              "counts": counts,
              "has_followups": len(outstanding_followups) > 0,
              "body": body,
          }

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              # Write body to a temp file to avoid shell escaping issues
              Path("/tmp/issue_body.md").write_text(body)
              f.write(f"today={today}\n")
              f.write(f"total={total}\n")
              f.write(f"has_followups={'true' if outstanding_followups else 'false'}\n")

          PYEOF

      - name: Post GitHub issue (no follow-ups)
        if: steps.parse.outputs.has_followups == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[Weekly] Pipeline health review ${{ steps.parse.outputs.today }}" \
            --body-file /tmp/issue_body.md \
            --label "pipeline-health"

      - name: Post GitHub issue (with follow-ups)
        if: steps.parse.outputs.has_followups == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[Weekly] Pipeline health review ${{ steps.parse.outputs.today }}" \
            --body-file /tmp/issue_body.md \
            --label "pipeline-health" \
            --label "needs-improvement"

      - name: Emit nightly-status artifact
        run: |
          python - <<'PYEOF'
          import json
          from pathlib import Path
          from datetime import datetime, timezone

          body = Path("/tmp/issue_body.md").read_text()
          status = {
              "workflow": "pipeline-health-review",
              "timestamp": datetime.now(timezone.utc).isoformat(),
              "total_learnings": "${{ steps.parse.outputs.total }}",
              "has_followups": "${{ steps.parse.outputs.has_followups }}" == "true",
              "summary": body[:500],
          }
          out = Path("nightly-status-pipeline-health.json")
          out.write_text(json.dumps(status, indent=2))
          print(f"Wrote {out}")
          PYEOF

      - name: Upload nightly-status artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightly-status-pipeline-health
          path: nightly-status-pipeline-health.json
          retention-days: 14
