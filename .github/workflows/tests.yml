name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # Self-heal — repair lockfile drift / stale PHPStan baseline / rebase
  # Runs before the test jobs so they don't fail on administrative issues.
  # Only runs on PRs (not push to main which is already clean).
  # ─────────────────────────────────────────────────────────────────────────
  self-heal:
    name: Self-heal branch
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/self-heal.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
      pr_branch: ${{ github.event.pull_request.head.ref }}
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
      ntfy_url: ${{ secrets.NTFY_URL }}
      ntfy_topic: ${{ secrets.NTFY_TOPIC }}

  # ─────────────────────────────────────────────────────────────────────────
  # Fast unit suite — no MySQL, runs in ~30s, blocks every PR
  # ─────────────────────────────────────────────────────────────────────────
  unit:
    name: PHPUnit unit (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    needs: [self-heal]
    if: always() && !cancelled()
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.4']

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f  # v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: pdo_mysql, zip, gd, mbstring, curl, mysqlnd
          coverage: pcov

      - name: Cache Composer dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: PHP syntax lint
        run: find src public tests -name '*.php' -print0 | xargs -0 -P4 -n1 php -l > /dev/null

      - name: Composer security audit
        run: composer audit --no-dev --format=plain

      - name: PHPStan static analysis
        run: vendor/bin/phpstan analyse --memory-limit=512M --configuration=phpstan.neon --no-progress

      - name: PHPCS code style (PSR-12)
        run: vendor/bin/phpcs --standard=PSR12 --extensions=php src/ --ignore=src/Services/Prompts/ -n -q

      - name: Create .env
        run: |
          echo "APP_ENV=testing" > .env
          echo "APP_URL=http://localhost" >> .env
          echo "APP_DEBUG=true" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=stratflow" >> .env
          echo "DB_USERNAME=stratflow" >> .env
          echo "DB_PASSWORD=stratflow_secret" >> .env
          echo "GEMINI_API_KEY=test-key" >> .env
          echo "GEMINI_MODEL=gemini-2.0-flash" >> .env
          echo "STRIPE_PUBLISHABLE_KEY=pk_test_xxx" >> .env
          echo "STRIPE_SECRET_KEY=sk_test_xxx" >> .env
          echo "STRIPE_WEBHOOK_SECRET=whsec_xxx" >> .env
          echo "STRIPE_PRICE_PRODUCT=price_xxx" >> .env
          echo "STRIPE_PRICE_CONSULTANCY=price_xxx" >> .env
          echo "STRIPE_PRICE_USER_PACK=price_xxx" >> .env
          echo "STRIPE_PRICE_EVAL_BOARD=price_xxx" >> .env
          echo "MAIL_FROM_NAME=StratFlow" >> .env
          echo "MAIL_FROM_EMAIL=test@example.com" >> .env
          echo "MAIL_SMTP_HOST=localhost" >> .env
          echo "MAIL_SMTP_PORT=587" >> .env
          echo "MAIL_SMTP_USER=" >> .env
          echo "MAIL_SMTP_PASS=" >> .env
          echo "UPLOAD_MAX_SIZE=52428800" >> .env

      - name: Run unit tests with coverage
        run: |
          vendor/bin/phpunit \
            --configuration tests/phpunit.xml \
            --testsuite unit \
            --coverage-text \
            --coverage-clover coverage.xml \
            --log-junit junit-unit.xml \
            --colors=never

      - name: Enforce coverage threshold (≥60%)
        run: |
          COVERAGE=$(php -r "
            \$xml = simplexml_load_file('coverage.xml');
            \$metrics = \$xml->project->metrics;
            \$total = (int) \$metrics['statements'];
            \$covered = (int) \$metrics['coveredstatements'];
            echo \$total > 0 ? round(\$covered / \$total * 100, 1) : 0;
          ")
          echo "Line coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 12" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below the 12% threshold (unit suite only; integration suite coverage is measured separately)."
            exit 1
          fi

      - name: Upload coverage to Codecov
        if: matrix.php-version == '8.4'
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238  # v4
        with:
          files: coverage.xml
          flags: unit
          name: php-${{ matrix.php-version }}
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: unit-results-php${{ matrix.php-version }}
          path: |
            junit-unit.xml
            coverage.xml
          retention-days: 14

      - name: Write nightly status
        if: always() && matrix.php-version == '8.4'
        run: |
          python3 - <<'PYEOF'
          import json, os
          status = "fail" if os.environ.get("JOB_STATUS") != "success" else "pass"
          coverage = None
          try:
              import xml.etree.ElementTree as ET
              xml = ET.parse("coverage.xml")
              m = xml.getroot().find(".//project/metrics")
              if m is not None:
                  total   = int(m.get("statements", 0))
                  covered = int(m.get("coveredstatements", 0))
                  coverage = round(covered / total * 100, 1) if total else None
          except Exception:
              pass
          payload = {
              "job": "tests",
              "status": status,
              "metric": {"coverage": coverage} if coverage is not None else None,
              "findings_url": f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}" if status == "fail" else None,
              "run_id": os.environ["GITHUB_RUN_ID"],
          }
          with open("nightly-status.json", "w") as f:
              json.dump(payload, f)
          PYEOF
        env:
          JOB_STATUS: ${{ job.status }}

      - name: Upload nightly status artifact
        if: always() && matrix.php-version == '8.4'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: nightly-status-tests
          path: nightly-status.json
          retention-days: 7

      - name: Notify on failure
        if: failure() && matrix.php-version == '8.4'
        uses: ./.github/actions/ntfy-notify
        with:
          title: "StratFlow CI — unit tests FAILED"
          body: "PHPUnit unit suite failed on run ${{ github.run_id }}. Branch: ${{ github.ref_name }}"
          priority: high
          tags: "warning,ci,tests"
          click_url: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ntfy_url: ${{ secrets.NTFY_URL }}
          ntfy_topic: ${{ secrets.NTFY_TOPIC }}

  # ─────────────────────────────────────────────────────────────────────────
  # Integration suite — MySQL backed, runs in parallel with unit job
  # ─────────────────────────────────────────────────────────────────────────
  integration:
    name: PHPUnit integration (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    needs: [self-heal]
    if: always() && !cancelled()
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.4']

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: stratflow
          MYSQL_USER: stratflow
          MYSQL_PASSWORD: stratflow_secret
          MYSQL_AUTHENTICATION_PLUGIN: mysql_native_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f  # v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: pdo_mysql, zip, gd, mbstring, curl, mysqlnd
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Create .env
        run: |
          echo "APP_ENV=testing" > .env
          echo "APP_URL=http://localhost" >> .env
          echo "APP_DEBUG=true" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=stratflow" >> .env
          echo "DB_USERNAME=stratflow" >> .env
          echo "DB_PASSWORD=stratflow_secret" >> .env
          echo "GEMINI_API_KEY=test-key" >> .env
          echo "GEMINI_MODEL=gemini-2.0-flash" >> .env
          echo "STRIPE_PUBLISHABLE_KEY=pk_test_xxx" >> .env
          echo "STRIPE_SECRET_KEY=sk_test_xxx" >> .env
          echo "STRIPE_WEBHOOK_SECRET=whsec_xxx" >> .env
          echo "STRIPE_PRICE_PRODUCT=price_xxx" >> .env
          echo "STRIPE_PRICE_CONSULTANCY=price_xxx" >> .env
          echo "STRIPE_PRICE_USER_PACK=price_xxx" >> .env
          echo "STRIPE_PRICE_EVAL_BOARD=price_xxx" >> .env
          echo "MAIL_FROM_NAME=StratFlow" >> .env
          echo "MAIL_FROM_EMAIL=test@example.com" >> .env
          echo "MAIL_SMTP_HOST=localhost" >> .env
          echo "MAIL_SMTP_PORT=587" >> .env
          echo "MAIL_SMTP_USER=" >> .env
          echo "MAIL_SMTP_PASS=" >> .env
          echo "UPLOAD_MAX_SIZE=52428800" >> .env

      - name: Initialize database
        run: mysql -h 127.0.0.1 -u stratflow -pstratflow_secret stratflow < database/schema.sql

      - name: Run migrations
        run: |
          for f in database/migrations/*.sql; do
            echo "Running $f..."
            mysql -h 127.0.0.1 -u stratflow -pstratflow_secret stratflow < "$f" 2>/dev/null || true
          done

      - name: Run integration tests
        run: |
          vendor/bin/phpunit \
            --configuration tests/phpunit.xml \
            --testsuite integration \
            --log-junit junit-integration.xml \
            --colors=never

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: integration-results-php${{ matrix.php-version }}
          path: junit-integration.xml
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────
  # Touched-file test gate — every modified src/*.php must have a test change
  # ─────────────────────────────────────────────────────────────────────────
  test-touch-check:
    name: Test-touch gate
    runs-on: ubuntu-latest
    # Only meaningful on PRs — push to main skips (merge already reviewed)
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Enforce test-touches-code rule
        run: |
          python3 scripts/ci/check_test_touches.py \
            --base origin/main \
            --head HEAD
        env:
          GH_PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────
  # k6 PR smoke — 30s, 1 VU, critical public paths.
  # Threshold: p95 < 2s, error rate < 5%.
  # Catches per-PR latency regressions before merge.
  # ─────────────────────────────────────────────────────────────────────────
  k6-smoke:
    name: k6 smoke (30s)
    runs-on: ubuntu-latest
    needs: [self-heal]
    if: always() && !cancelled() && github.event_name == 'pull_request'
    timeout-minutes: 5

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: stratflow
          MYSQL_USER: stratflow
          MYSQL_PASSWORD: stratflow_secret
          MYSQL_AUTHENTICATION_PLUGIN: mysql_native_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f  # v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql, zip, gd, mbstring, curl, mysqlnd

      - name: Cache Composer dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Create .env
        run: |
          echo "APP_ENV=testing" > .env
          echo "APP_URL=http://localhost:8890" >> .env
          echo "APP_DEBUG=true" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=stratflow" >> .env
          echo "DB_USERNAME=stratflow" >> .env
          echo "DB_PASSWORD=stratflow_secret" >> .env
          echo "GEMINI_API_KEY=test-key" >> .env
          echo "GEMINI_MODEL=gemini-2.0-flash" >> .env
          echo "STRIPE_PUBLISHABLE_KEY=pk_test_xxx" >> .env
          echo "STRIPE_SECRET_KEY=sk_test_xxx" >> .env
          echo "STRIPE_WEBHOOK_SECRET=whsec_xxx" >> .env
          echo "STRIPE_PRICE_PRODUCT=price_xxx" >> .env
          echo "STRIPE_PRICE_CONSULTANCY=price_xxx" >> .env
          echo "STRIPE_PRICE_USER_PACK=price_xxx" >> .env
          echo "STRIPE_PRICE_EVAL_BOARD=price_xxx" >> .env
          echo "MAIL_FROM_NAME=StratFlow" >> .env
          echo "MAIL_FROM_EMAIL=test@example.com" >> .env
          echo "MAIL_SMTP_HOST=localhost" >> .env
          echo "MAIL_SMTP_PORT=587" >> .env
          echo "MAIL_SMTP_USER=" >> .env
          echo "MAIL_SMTP_PASS=" >> .env
          echo "UPLOAD_MAX_SIZE=52428800" >> .env
          echo "SESSION_DRIVER=file" >> .env

      - name: Initialize database
        run: mysql -h 127.0.0.1 -u stratflow -pstratflow_secret stratflow < database/schema.sql

      - name: Run migrations
        run: |
          for f in database/migrations/*.sql; do
            mysql -h 127.0.0.1 -u stratflow -pstratflow_secret stratflow < "$f" \
              || echo "::warning::Migration $f failed (may be already applied)"
          done

      - name: Seed database
        run: mysql -h 127.0.0.1 -u stratflow -pstratflow_secret stratflow < database/seed.sql

      - name: Start PHP dev server
        run: |
          php -S 0.0.0.0:8890 -t public public/index.php &
          # Poll until the server accepts connections rather than sleeping a fixed 2s
          for i in $(seq 1 20); do
            curl -sf http://localhost:8890/healthz >/dev/null 2>&1 && break
            sleep 1
          done

      - name: Install k6
        run: |
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq && sudo apt-get install -y k6 --quiet

      - name: Run k6 smoke (30s, p95 < 2s)
        run: |
          k6 run \
            --env BASE_URL=http://localhost:8890 \
            --out json=k6-smoke-results.json \
            tests/performance/k6-smoke.js

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: k6-smoke-results
          path: k6-smoke-results.json
          retention-days: 7
