name: Snyk Security Scan

on:
  workflow_dispatch:
  # Daily at 15:00 UTC = ~3 am NZT
  schedule:
    - cron: "0 15 * * *"

concurrency:
  group: snyk
  cancel-in-progress: true

jobs:
  snyk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql, mbstring, curl

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run Snyk PHP scan
        id: snyk
        uses: snyk/actions/php@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk.sarif
        continue-on-error: true   # baseline-diff step below decides pass/fail

      - name: Upload SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif

      - name: Check against baseline + write nightly status
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json, os, sys

          # Count high/critical findings from SARIF
          critical_count = 0
          try:
              sarif = json.load(open("snyk.sarif"))
              for run in sarif.get("runs", []):
                  for result in run.get("results", []):
                      if result.get("level") in ("error", "critical"):
                          critical_count += 1
          except Exception:
              pass

          # Compare against accepted baseline
          baseline_count = 0
          try:
              b = json.load(open("tests/security/baseline-snyk.json"))
              baseline_count = (b.get("metric") or {}).get("critical_count", 0) or 0
          except Exception:
              pass

          new_findings = max(0, critical_count - baseline_count)

          if new_findings > 0:
              print(f"::error::Snyk found {new_findings} new high/critical CVE(s) above accepted baseline ({baseline_count}). "
                    f"Fix them or run: python scripts/ci/update_security_baseline.py snyk")
              scan_status = "fail"
          elif critical_count > 0:
              print(f"::warning::Snyk found {critical_count} high/critical CVE(s) — all within accepted baseline.")
              scan_status = "warn"
          else:
              print("Snyk: no high/critical CVEs.")
              scan_status = "pass"

          payload = {
              "job": "snyk",
              "status": scan_status,
              "metric": {"critical_count": critical_count, "new_findings": new_findings} if critical_count else None,
              "findings_url": f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}" if scan_status == "fail" else None,
              "run_id": os.environ["GITHUB_RUN_ID"],
          }
          with open("nightly-status.json", "w") as f:
              json.dump(payload, f)

          if scan_status == "fail":
              sys.exit(1)
          PYEOF
        env:
          JOB_STATUS: ${{ job.status }}

      - name: Upload nightly status artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-status-snyk
          path: nightly-status.json
          retention-days: 7

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/ntfy-notify
        with:
          title: "StratFlow CI — Snyk scan FAILED"
          body: "Snyk found high/critical CVEs. Run ${{ github.run_id }}"
          priority: urgent
          tags: "warning,ci,security,snyk"
          click_url: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
