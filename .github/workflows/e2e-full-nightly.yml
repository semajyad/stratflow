name: E2E Full (nightly — staging)

# Runs the full Playwright matrix against staging every night at 16:30 UTC.
# Catches staging drift (CDN changes, third-party API updates, config drift)
# that the PR-time e2e-full (against localhost) wouldn't catch.
#
# Required secrets: STAGING_URL, ZAP_SMOKE_EMAIL, ZAP_SMOKE_PASSWORD

on:
  schedule:
    - cron: "30 16 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-full-nightly
  cancel-in-progress: true

jobs:
  e2e-full-nightly:
    name: Playwright full matrix (staging)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tests/Playwright/package-lock.json

      - name: Install Playwright
        working-directory: tests/Playwright
        run: npm ci

      - name: Install all browsers
        working-directory: tests/Playwright
        run: npx playwright install --with-deps

      # ZAP (16:00) and Shannon AI (14:00) are authenticated and mutate staging
      # state (create/delete records). Re-seed the staging database before
      # running Playwright to prevent state bleed from those scans.
      - name: Re-seed staging database
        env:
          STAGING_SEED_URL: ${{ secrets.STAGING_SEED_URL }}
          STAGING_SEED_TOKEN: ${{ secrets.STAGING_SEED_TOKEN }}
        run: |
          if [ -n "$STAGING_SEED_URL" ] && [ -n "$STAGING_SEED_TOKEN" ]; then
            echo "Re-seeding staging database via seed endpoint..."
            curl -sSf -X POST "$STAGING_SEED_URL" \
              -H "Authorization: Bearer $STAGING_SEED_TOKEN" \
              -H "Content-Type: application/json" \
              --max-time 120 \
              && echo "Seed complete." || echo "::warning::Seed endpoint unavailable — proceeding with current state."
          else
            echo "::notice::STAGING_SEED_URL/TOKEN not set — skipping re-seed. State from ZAP/Shannon may affect results."
          fi

      - name: Run Playwright full suite against staging
        working-directory: tests/Playwright
        env:
          CI: 'true'
          BASE_URL: ${{ secrets.STAGING_URL }}
          E2E_EMAIL: ${{ secrets.ZAP_SMOKE_EMAIL }}
          E2E_PASSWORD: ${{ secrets.ZAP_SMOKE_PASSWORD }}
          # Direct DB mutation specs skip on staging by default. Set this only
          # for an environment where DB_HOST/DB_PORT point at disposable data.
          E2E_DB_ACCESS: 'false'
        run: >
          npm run test:nightly
      - name: Write nightly status
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json, os
          status = "fail" if os.environ.get("JOB_STATUS") != "success" else "pass"
          payload = {
              "job": "e2e",
              "status": status,
              "metric": None,
              "findings_url": f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}" if status == "fail" else None,
              "run_id": os.environ["GITHUB_RUN_ID"],
          }
          with open("nightly-status.json", "w") as f:
              json.dump(payload, f)
          PYEOF
        env:
          JOB_STATUS: ${{ job.status }}

      - name: Upload nightly status artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: nightly-status-e2e
          path: nightly-status.json
          retention-days: 7

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: e2e-nightly-artifacts
          path: tests/Playwright/test-results/
          retention-days: 7

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/ntfy-notify
        with:
          title: "StratFlow CI — nightly E2E full FAILED"
          body: "Playwright full matrix against staging failed. Run ${{ github.run_id }}"
          priority: urgent
          tags: "warning,ci,e2e,staging"
          click_url: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ntfy_url: ${{ secrets.NTFY_URL }}
          ntfy_topic: ${{ secrets.NTFY_TOPIC }}

  e2e-full-disposable-db:
    name: Playwright full matrix (disposable DB)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: stratflow
          MYSQL_USER: stratflow
          MYSQL_PASSWORD: stratflow_secret
          MYSQL_AUTHENTICATION_PLUGIN: mysql_native_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=15
          --tmpfs /var/lib/mysql:rw,noexec,nosuid,size=512m

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f  # v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql, zip, gd, mbstring, curl, mysqlnd
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Create .env
        run: |
          echo "APP_ENV=testing" > .env
          echo "APP_URL=http://localhost:8890" >> .env
          echo "APP_DEBUG=true" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=stratflow" >> .env
          echo "DB_USERNAME=stratflow" >> .env
          echo "DB_PASSWORD=stratflow_secret" >> .env
          echo "GEMINI_API_KEY=test-key" >> .env
          echo "GEMINI_MODEL=gemini-2.0-flash" >> .env
          echo "STRIPE_PUBLISHABLE_KEY=pk_test_xxx" >> .env
          echo "STRIPE_SECRET_KEY=sk_test_xxx" >> .env
          echo "STRIPE_WEBHOOK_SECRET=whsec_xxx" >> .env
          echo "STRIPE_PRICE_PRODUCT=price_xxx" >> .env
          echo "STRIPE_PRICE_CONSULTANCY=price_xxx" >> .env
          echo "STRIPE_PRICE_USER_PACK=price_xxx" >> .env
          echo "STRIPE_PRICE_EVAL_BOARD=price_xxx" >> .env
          echo "MAIL_FROM_NAME=StratFlow" >> .env
          echo "MAIL_FROM_EMAIL=test@example.com" >> .env
          echo "MAIL_SMTP_HOST=localhost" >> .env
          echo "MAIL_SMTP_PORT=587" >> .env
          echo "MAIL_SMTP_USER=" >> .env
          echo "MAIL_SMTP_PASS=" >> .env
          echo "UPLOAD_MAX_SIZE=52428800" >> .env
          echo "GROWTHBOOK_API_HOST=" >> .env
          echo "GROWTHBOOK_CLIENT_KEY=" >> .env
          echo "SESSION_DRIVER=file" >> .env

      - name: Initialize database and migrations
        run: php scripts/init-db.php

      - name: Seed test data
        run: mysql -h 127.0.0.1 -u stratflow -pstratflow_secret stratflow < database/seed.sql

      - name: Start PHP dev server
        run: |
          php -S 0.0.0.0:8890 -t public public/index.php &
          for i in {1..30}; do
            if curl -fsS http://localhost:8890/healthz >/dev/null; then
              echo "Dev server is ready"
              exit 0
            fi
            echo "Waiting for dev server ($i/30)..."
            sleep 2
          done
          echo "::error::Dev server did not become ready at /healthz"
          exit 1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tests/Playwright/package-lock.json

      - name: Install Playwright
        working-directory: tests/Playwright
        run: npm ci

      - name: Install all browsers
        working-directory: tests/Playwright
        run: npx playwright install --with-deps

      - name: Run Playwright full suite against disposable DB
        working-directory: tests/Playwright
        env:
          CI: 'true'
          BASE_URL: 'http://localhost:8890'
          DB_HOST: '127.0.0.1'
          DB_PORT: '3306'
          DB_USERNAME: 'stratflow'
          DB_PASSWORD: 'stratflow_secret'
          DB_DATABASE: 'stratflow'
          E2E_DB_ACCESS: 'true'
        run: npm run test:nightly

      - name: Write nightly status
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json, os
          status = "fail" if os.environ.get("JOB_STATUS") != "success" else "pass"
          payload = {
              "job": "e2e-db",
              "status": status,
              "metric": None,
              "findings_url": f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}" if status == "fail" else None,
              "run_id": os.environ["GITHUB_RUN_ID"],
          }
          with open("nightly-status-db.json", "w") as f:
              json.dump(payload, f)
          PYEOF
        env:
          JOB_STATUS: ${{ job.status }}

      - name: Upload nightly status artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: nightly-status-e2e-db
          path: nightly-status-db.json
          retention-days: 7

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: e2e-nightly-db-artifacts
          path: tests/Playwright/test-results/
          retention-days: 7

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/ntfy-notify
        with:
          title: "StratFlow CI — nightly E2E disposable DB FAILED"
          body: "Playwright full matrix against disposable DB failed. Run ${{ github.run_id }}"
          priority: urgent
          tags: "warning,ci,e2e,db"
          click_url: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ntfy_url: ${{ secrets.NTFY_URL }}
          ntfy_topic: ${{ secrets.NTFY_TOPIC }}
