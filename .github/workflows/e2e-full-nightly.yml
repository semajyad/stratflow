name: E2E Full (nightly — staging)

# Runs the full Playwright matrix against staging every night at 16:30 UTC.
# Catches staging drift (CDN changes, third-party API updates, config drift)
# that the PR-time e2e-full (against localhost) wouldn't catch.
#
# Required secrets: STAGING_URL, ZAP_SMOKE_EMAIL, ZAP_SMOKE_PASSWORD

on:
  schedule:
    - cron: "30 16 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-full-nightly
  cancel-in-progress: true

jobs:
  e2e-full-nightly:
    name: Playwright full matrix (staging)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tests/Playwright/package-lock.json

      - name: Install Playwright
        working-directory: tests/Playwright
        run: npm ci

      - name: Install all browsers
        working-directory: tests/Playwright
        run: npx playwright install --with-deps

      # ZAP (16:00) and Shannon AI (14:00) are authenticated and mutate staging
      # state (create/delete records). Re-seed the staging database before
      # running Playwright to prevent state bleed from those scans.
      - name: Re-seed staging database
        env:
          STAGING_SEED_URL: ${{ secrets.STAGING_SEED_URL }}
          STAGING_SEED_TOKEN: ${{ secrets.STAGING_SEED_TOKEN }}
        run: |
          if [ -n "$STAGING_SEED_URL" ] && [ -n "$STAGING_SEED_TOKEN" ]; then
            echo "Re-seeding staging database via seed endpoint..."
            curl -sSf -X POST "$STAGING_SEED_URL" \
              -H "Authorization: Bearer $STAGING_SEED_TOKEN" \
              -H "Content-Type: application/json" \
              --max-time 120 \
              && echo "Seed complete." || echo "::warning::Seed endpoint unavailable — proceeding with current state."
          else
            echo "::notice::STAGING_SEED_URL/TOKEN not set — skipping re-seed. State from ZAP/Shannon may affect results."
          fi

      - name: Run Playwright full suite against staging
        working-directory: tests/Playwright
        env:
          CI: 'true'
          BASE_URL: ${{ secrets.STAGING_URL }}
          E2E_EMAIL: ${{ secrets.ZAP_SMOKE_EMAIL }}
          E2E_PASSWORD: ${{ secrets.ZAP_SMOKE_PASSWORD }}
        run: >
          npx playwright test
          --project=fast
          --project=full
          --project=firefox
          --project=webkit
          --project=mobile-chrome
      - name: Write nightly status
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json, os
          status = "fail" if os.environ.get("JOB_STATUS") != "success" else "pass"
          payload = {
              "job": "e2e",
              "status": status,
              "metric": None,
              "findings_url": f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}" if status == "fail" else None,
              "run_id": os.environ["GITHUB_RUN_ID"],
          }
          with open("nightly-status.json", "w") as f:
              json.dump(payload, f)
          PYEOF
        env:
          JOB_STATUS: ${{ job.status }}

      - name: Upload nightly status artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: nightly-status-e2e
          path: nightly-status.json
          retention-days: 7

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: e2e-nightly-artifacts
          path: tests/Playwright/test-results/
          retention-days: 7

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/ntfy-notify
        with:
          title: "StratFlow CI — nightly E2E full FAILED"
          body: "Playwright full matrix against staging failed. Run ${{ github.run_id }}"
          priority: urgent
          tags: "warning,ci,e2e,staging"
          click_url: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ntfy_url: ${{ secrets.NTFY_URL }}
          ntfy_topic: ${{ secrets.NTFY_TOPIC }}
