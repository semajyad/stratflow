name: Mutation Testing (Infection)

# Nightly mutation testing across the full src/ tree.
# Target: MSI >= 65%, covered MSI >= 75% (Wave 5 baseline).
# Security-critical files are subject to the stricter minMsi in infection.json.
# Too slow to run on every PR — nightly results surface in morning review.

on:
  workflow_dispatch:
  schedule:
    # 13:00 UTC daily = ~1 am NZT
    - cron: "0 13 * * *"

concurrency:
  group: mutation-testing
  cancel-in-progress: true

jobs:
  mutation:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write  # to post MSI comment on PRs triggered via workflow_dispatch

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: stratflow
          MYSQL_USER: stratflow
          MYSQL_PASSWORD: stratflow_secret
          MYSQL_AUTHENTICATION_PLUGIN: mysql_native_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=15

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql, zip, gd, mbstring, curl, pcov
          coverage: pcov

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Create .env
        run: |
          echo "APP_ENV=testing" > .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=stratflow" >> .env
          echo "DB_USERNAME=stratflow" >> .env
          echo "DB_PASSWORD=stratflow_secret" >> .env
          echo "GEMINI_API_KEY=test-key" >> .env

      - name: Initialize database
        run: |
          mysql -h 127.0.0.1 -u stratflow -pstratflow_secret stratflow < database/schema.sql
          for f in database/migrations/*.sql; do
            mysql -h 127.0.0.1 -u stratflow -pstratflow_secret stratflow < "$f" 2>/dev/null || true
          done

      - name: Run Infection mutation testing (full src/)
        id: infection
        run: |
          vendor/bin/infection \
            --configuration=infection.json \
            --threads=4 \
            --only-covered \
            --show-mutations \
            --no-progress
        continue-on-error: true  # capture exit code; we report below

      - name: Extract MSI from infection log
        id: msi
        run: |
          if [ -f var/infection.log ]; then
            MSI=$(grep -oP 'Mutation Score Indicator \(MSI\): \K[\d.]+' var/infection.log | tail -1)
            COVERED=$(grep -oP 'Covered Code MSI: \K[\d.]+' var/infection.log | tail -1)
            echo "msi=${MSI:-unknown}" >> "$GITHUB_OUTPUT"
            echo "covered_msi=${COVERED:-unknown}" >> "$GITHUB_OUTPUT"
            echo "MSI: ${MSI:-unknown}%  |  Covered MSI: ${COVERED:-unknown}%"
          else
            echo "msi=unknown" >> "$GITHUB_OUTPUT"
            echo "covered_msi=unknown" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Infection HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: infection-report-${{ github.run_id }}
          path: var/infection.html
          retention-days: 30

      - name: Fail if Infection exit code non-zero
        if: steps.infection.outcome == 'failure'
        run: |
          echo "::error::Infection failed — MSI ${{ steps.msi.outputs.msi }}% below threshold. See artifact for surviving mutants."
          exit 1
