name: Branch Protection Assertion

# Runs daily to confirm that required status checks on main haven't drifted.
# Alerts via a workflow failure (visible in Actions + GitHub notifications) if
# any required check is missing.

on:
  workflow_dispatch:
  schedule:
    # 17:00 UTC daily = ~5 am NZT
    - cron: "0 17 * * *"

permissions: read-all

jobs:
  assert:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Check required status checks on main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -t REQUIRED_CHECKS < <(
            grep -vE '^\s*(#|$)' .github/auto-merge-required.txt
          )

          PROTECTION=$(gh api repos/${{ github.repository }}/branches/main/protection 2>&1) || FETCH_FAILED=1

          if [ "${FETCH_FAILED:-0}" = "1" ]; then
            if echo "$PROTECTION" | grep -qE "403|Upgrade to GitHub Pro|not found"; then
              echo "::warning::Branch protection rules require GitHub Pro for private repos."
              echo "Protection is enforced via the auto-merge.yml workflow instead."
              exit 0
            else
              echo "::error::Unexpected gh api failure: $PROTECTION"
              exit 1
            fi
          fi

          MISSING=$(printf '%s\n' "${REQUIRED_CHECKS[@]}" | PROTECTION_JSON="$PROTECTION" python3 -c "
          import json, os, sys
          protection = json.loads(os.environ['PROTECTION_JSON'])
          configured = {
              c.get('context', '')
              for c in protection.get('required_status_checks', {}).get('checks', [])
          }
          required = [line.rstrip('\n') for line in sys.stdin if line.strip()]
          for check in required:
              if check not in configured:
                  print(check)
          " 2>/dev/null || printf '%s\n' "${REQUIRED_CHECKS[@]}")

          if [ -n "$MISSING" ]; then
            echo "::error::Branch protection missing required checks:"
            printf '%s\n' "$MISSING" | sed 's/^/::error::  - /'
            echo "Go to Settings → Branches → main → Edit to add them."
            exit 1
          fi

          echo "✅ All required status checks are configured on main: ${REQUIRED_CHECKS[*]}"
