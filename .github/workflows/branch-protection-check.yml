name: Branch Protection Assertion

# Runs daily to confirm that required status checks on main haven't drifted.
# Alerts via a workflow failure (visible in Actions + GitHub notifications) if
# any required check is missing.

on:
  workflow_dispatch:
  schedule:
    # 17:00 UTC daily = ~5 am NZT
    - cron: "0 17 * * *"

jobs:
  assert:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check required status checks on main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REQUIRED_CHECKS=(
            "test"
            "review"
            "gitleaks"
            "dependency-review"
            # "snyk" removed: snyk.yml runs on schedule only and never posts a PR check
            # context, so listing it here caused the assertion to report a false gap.
            # Snyk coverage is maintained by the nightly scheduled run + SARIF upload.
          )

          PROTECTION=$(gh api repos/${{ github.repository }}/branches/main/protection 2>&1) || FETCH_FAILED=1

          if [ "${FETCH_FAILED:-0}" = "1" ]; then
            if echo "$PROTECTION" | grep -qE "403|Upgrade to GitHub Pro|not found"; then
              echo "::warning::Branch protection rules require GitHub Pro for private repos."
              echo "Protection is enforced via the auto-merge.yml workflow instead."
              exit 0
            else
              echo "::error::Unexpected gh api failure: $PROTECTION"
              exit 1
            fi
          fi

          CONFIGURED=$(echo "$PROTECTION" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          checks = data.get('required_status_checks', {}).get('checks', [])
          print(' '.join(c['context'] for c in checks))
          " 2>/dev/null || echo "")

          MISSING=()
          for check in "${REQUIRED_CHECKS[@]}"; do
            if ! echo "$CONFIGURED" | grep -qw "$check"; then
              MISSING+=("$check")
            fi
          done

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Branch protection missing required checks: ${MISSING[*]}"
            echo "Go to Settings → Branches → main → Edit to add them."
            exit 1
          fi

          echo "✅ All required status checks are configured on main: ${REQUIRED_CHECKS[*]}"
