name: Branch Protection Assertion

# Runs daily to confirm that required status checks on main have not drifted.
# Alerts via a workflow failure (visible in Actions + GitHub notifications) if
# any required check is missing from the active main ruleset.

on:
  workflow_dispatch:
  schedule:
    # 17:00 UTC daily = ~5 am NZT
    - cron: "0 17 * * *"

permissions: read-all

jobs:
  assert:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Check required status checks on main ruleset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          mapfile -t REQUIRED_CHECKS < <(grep -Ev '^\s*(#|$)' .github/auto-merge-required.txt)

          RULESET_ID=$(gh api "repos/$REPO/rulesets"             --jq '.[] | select(.target == "branch" and .enforcement == "active" and .name == "main-protection") | .id'             | head -n1)

          if [ -z "$RULESET_ID" ]; then
            echo "::error::Active branch ruleset 'main-protection' was not found."
            exit 1
          fi

          CONFIGURED=$(gh api "repos/$REPO/rulesets/$RULESET_ID"             --jq '.rules[] | select(.type == "required_status_checks") | .parameters["required_status_checks"][].context'             2>/dev/null || true)

          MISSING=()
          for check in "${REQUIRED_CHECKS[@]}"; do
            if ! echo "$CONFIGURED" | grep -Fxq "$check"; then
              MISSING+=("$check")
            fi
          done

          UNEXPECTED=()
          while IFS= read -r check; do
            [ -z "$check" ] && continue
            if ! printf '%s\n' "${REQUIRED_CHECKS[@]}" | grep -Fxq "$check"; then
              UNEXPECTED+=("$check")
            fi
          done <<< "$CONFIGURED"

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::main-protection ruleset is missing required checks: ${MISSING[*]}"
            echo "Update Settings -> Rules -> Rulesets -> main-protection."
            exit 1
          fi

          if [ ${#UNEXPECTED[@]} -gt 0 ]; then
            echo "::error::main-protection ruleset has required checks not listed in .github/auto-merge-required.txt: ${UNEXPECTED[*]}"
            echo "Update .github/auto-merge-required.txt or remove the unexpected ruleset checks."
            exit 1
          fi

          declare -A REQUIRED_WORKFLOWS=(
            ["PHPUnit unit (PHP 8.4)"]=".github/workflows/tests.yml"
            ["PHPUnit integration (PHP 8.4)"]=".github/workflows/tests.yml"
            ["Test-touch gate"]=".github/workflows/tests.yml"
            ["Python CI helper tests"]=".github/workflows/tests.yml"
            ["Playwright (fast — Chromium)"]=".github/workflows/e2e.yml"
            ["Multi-agent guard"]=".github/workflows/multi-agent-guard.yml"
            ["trufflehog"]=".github/workflows/secret-scan.yml"
            ["Semgrep (PR)"]=".github/workflows/semgrep.yml"
            ["Analyze JavaScript"]=".github/workflows/codeql.yml"
            ["Checkov IaC"]=".github/workflows/checkov.yml"
            ["dependency-review"]=".github/workflows/dependency-review.yml"
            ["SBOM (Syft) + Grype CVE scan"]=".github/workflows/sbom.yml"
          )

          MERGE_GROUP_MISSING=()
          for check in "${REQUIRED_CHECKS[@]}"; do
            wf="${REQUIRED_WORKFLOWS[$check]:-}"
            if [ -n "$wf" ] && ! grep -q 'merge_group:' "$wf"; then
              MERGE_GROUP_MISSING+=("$check -> $wf")
            fi
          done

          if [ ${#MERGE_GROUP_MISSING[@]} -gt 0 ]; then
            echo "::error::Required check workflow(s) missing merge_group trigger: ${MERGE_GROUP_MISSING[*]}"
            exit 1
          fi

          echo "All required status checks are configured on main: ${REQUIRED_CHECKS[*]}"
