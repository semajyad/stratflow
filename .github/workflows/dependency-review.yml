name: Dependency Review

# Blocks PRs that introduce dependencies with known vulnerabilities.
# Runs at merge time — complements the nightly Snyk scan which runs
# against main after merge.

on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]

concurrency:
  group: dependency-review-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup PHP for merge queue audit
        if: github.event_name == 'merge_group'
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f  # v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Dependency Review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48  # v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
          config-file: .github/dependency-review-config.yml

      - name: Composer audit for merge queue
        if: github.event_name == 'merge_group'
        run: composer audit --no-dev --format=plain
