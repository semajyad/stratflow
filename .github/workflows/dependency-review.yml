name: Dependency Review

# Blocks PRs that introduce dependencies with known vulnerabilities.
# Runs at merge time — complements the nightly Snyk scan which runs
# against main after merge.

on:
  pull_request:
    branches: [main]

concurrency:
  group: dependency-review-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        # GitHub Advanced Security (GHAS) is required on private repos.
        # Without it the action fails with "not supported on this repository".
        # composer audit in tests.yml already covers CVEs at the tool level.
        # Advisory only — visible but not blocking.
        continue-on-error: true
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
