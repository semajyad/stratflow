name: Semgrep PHP

# Fast SAST scan — complements CodeQL's deep analysis.
# PR scan: ~60s, runs php + owasp-top-ten rulesets on changed src/ files.
# Nightly full scan: entire codebase, uploads SARIF to GitHub Security tab.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly at 13:30 UTC (after mutation testing, before Shannon at 14:00)
    - cron: '30 13 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write  # required for SARIF upload to GitHub

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Semgrep (${{ github.event_name == 'schedule' && 'nightly' || 'PR' }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Install Semgrep
        run: pip install semgrep --quiet

      - name: Determine scan scope
        id: scope
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # PR scan: only changed src/ files against base
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'src/**/*.php' | tr '\n' ' ')
            if [ -z "$CHANGED" ]; then
              echo "no_php_changes=true" >> "$GITHUB_OUTPUT"
              echo "No PHP changes in src/ — skipping scan"
            else
              echo "targets=$CHANGED" >> "$GITHUB_OUTPUT"
              echo "no_php_changes=false" >> "$GITHUB_OUTPUT"
            fi
          else
            # Push/nightly: full src/ scan
            echo "targets=src/" >> "$GITHUB_OUTPUT"
            echo "no_php_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Semgrep (PR — changed files only)
        if: steps.scope.outputs.no_php_changes != 'true' && github.event_name == 'pull_request'
        run: |
          semgrep scan \
            --config "p/php" \
            --config "p/owasp-top-ten" \
            --error \
            --timeout 300 \
            ${{ steps.scope.outputs.targets }}

      - name: Run Semgrep and emit SARIF (nightly / push to main)
        if: steps.scope.outputs.no_php_changes != 'true' && github.event_name != 'pull_request'
        run: |
          semgrep scan \
            --config "p/php" \
            --config "p/owasp-top-ten" \
            --sarif \
            --output semgrep-results.sarif \
            --timeout 300 \
            src/ || true

      - name: Upload SARIF to GitHub Security tab
        if: steps.scope.outputs.no_php_changes != 'true' && github.event_name != 'pull_request' && always()
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699  # v3
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

      - name: Write nightly status
        if: github.event_name == 'schedule' && always()
        run: |
          python3 - <<'PYEOF'
          import json, os
          status = "fail" if os.environ.get("JOB_STATUS") != "success" else "pass"
          payload = {
              "job": "semgrep",
              "status": status,
              "metric": None,
              "findings_url": f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}" if status == "fail" else None,
              "run_id": os.environ["GITHUB_RUN_ID"],
          }
          with open("nightly-status.json", "w") as f:
              json.dump(payload, f)
          PYEOF
        env:
          JOB_STATUS: ${{ job.status }}

      - name: Upload nightly status artifact
        if: github.event_name == 'schedule' && always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: nightly-status-semgrep
          path: nightly-status.json
          retention-days: 7
