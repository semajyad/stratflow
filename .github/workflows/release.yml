name: Release — SBOM + Image Signing + SLSA

# Runs on every semver tag push (e.g. v1.2.3).
# Produces:
#   1. CycloneDX SBOM (composer dependencies)
#   2. Container image signed with cosign (keyless OIDC)
#   3. SLSA provenance attestation
#   4. All artifacts attached to the GitHub Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write       # create release + upload artifacts
  packages: write       # push container image to GHCR
  id-token: write       # OIDC for cosign keyless signing + SLSA

jobs:
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    outputs:
      sbom-file: ${{ steps.sbom.outputs.sbom-file }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install CycloneDX composer plugin
        run: composer require --dev cyclonedx/cyclonedx-php-composer --no-interaction

      - name: Generate CycloneDX SBOM
        id: sbom
        run: |
          vendor/bin/cyclonedx-php-composer make-sbom \
            --output-format=JSON \
            --output-file=sbom.json \
            --no-dev
          echo "sbom-file=sbom.json" >> "$GITHUB_OUTPUT"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.ref_name }}
          path: sbom.json

  build-and-sign:
    name: Build + Sign Container
    runs-on: ubuntu-latest
    needs: sbom
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign container image (keyless OIDC)
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}@${{ steps.push.outputs.digest }}

  slsa-provenance:
    name: SLSA Provenance
    needs: build-and-sign
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ghcr.io/${{ github.repository }}
      digest: ${{ needs.build-and-sign.outputs.image-digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [sbom, build-and-sign]

    steps:
      - uses: actions/checkout@v4

      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: sbom-${{ github.ref_name }}

      - name: Create release with SBOM
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: sbom.json
