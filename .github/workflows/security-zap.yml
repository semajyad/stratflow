name: Security ZAP Scan

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Target URL to scan"
        required: false
        default: "https://stratflow-app-production.up.railway.app"
        type: string
      scan_mode:
        description: "ZAP scan mode"
        required: true
        default: "baseline"
        type: choice
        options:
          - baseline
          - full
  schedule:
    - cron: "0 18 * * 0"

jobs:
  zap-baseline:
    if: ${{ github.event_name == 'schedule' || inputs.scan_mode == 'baseline' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ZAP baseline scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ inputs.target_url || vars.ZAP_TARGET_URL || 'https://stratflow-app-production.up.railway.app' }}
          docker_name: ghcr.io/zaproxy/zaproxy:stable
          cmd_options: "-a -j -m 10 -T 15"
          allow_issue_writing: false
          fail_action: true
          artifact_name: zap-baseline-report

  zap-full:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.scan_mode == 'full' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ZAP full scan
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          target: ${{ inputs.target_url || vars.ZAP_TARGET_URL || 'https://stratflow-app-production.up.railway.app' }}
          docker_name: ghcr.io/zaproxy/zaproxy:stable
          cmd_options: "-a -j -T 30"
          allow_issue_writing: false
          fail_action: true
          artifact_name: zap-full-report
