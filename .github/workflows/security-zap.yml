name: Security ZAP Scan

on:
  # ZAP is removed from pull_request triggers:
  # (1) The zap-baseline job has permissions: contents: write + git push, which is
  #     unsafe on PRs from forks (elevated token on untrusted code).
  # (2) Authenticated ZAP context (smoke-test user) requires secrets not available
  #     on fork PRs anyway.
  # Regressions are caught by the nightly run and on-demand dispatch.
  workflow_dispatch:
    inputs:
      target_url:
        description: "Target URL to scan (must NOT be the production hostname)"
        required: false
        default: ""
        type: string
      scan_mode:
        description: "ZAP scan mode"
        required: true
        default: "baseline"
        type: choice
        options:
          - baseline
          - full
  # Daily at 16:00 UTC = ~4 am NZT (overnight) — catches regressions before the work day
  schedule:
    - cron: "0 16 * * *"

jobs:
  zap-baseline:
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.scan_mode == 'baseline') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit zap-latest.md

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve and guard scan target
        id: target
        run: |
          URL="${{ inputs.target_url || vars.APP_URL_STAGING || 'https://stratflow-app-test.up.railway.app' }}"
          PROD_HOSTNAMES=("stratflow.io" "app.stratflow.io" "stratflow-app-production.up.railway.app")
          for PROD in "${PROD_HOSTNAMES[@]}"; do
            if echo "$URL" | grep -qiF "$PROD"; then
              echo "::error::ZAP scan target '$URL' is a production hostname ($PROD). Set APP_URL_STAGING to a non-prod URL."
              exit 1
            fi
          done
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Scan target: $URL"

      - name: Authenticate smoke-test user
        id: auth
        env:
          ZAP_SMOKE_EMAIL:    ${{ secrets.ZAP_SMOKE_EMAIL }}
          ZAP_SMOKE_PASSWORD: ${{ secrets.ZAP_SMOKE_PASSWORD }}
        run: |
          # Skip authenticated scan if smoke credentials are not configured
          if [ -z "$ZAP_SMOKE_EMAIL" ] || [ -z "$ZAP_SMOKE_PASSWORD" ]; then
            echo "::warning::ZAP_SMOKE_EMAIL / ZAP_SMOKE_PASSWORD not set — running unauthenticated scan only"
            echo "auth_cookie_file=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          COOKIE_FILE="/tmp/zap-session.txt"
          bash tests/zap/pre-auth.sh \
            "${{ steps.target.outputs.url }}" \
            "$ZAP_SMOKE_EMAIL" \
            "$ZAP_SMOKE_PASSWORD" \
            "$COOKIE_FILE" && \
            echo "auth_cookie_file=$COOKIE_FILE" >> "$GITHUB_OUTPUT" || {
            echo "::warning::Pre-auth failed — running unauthenticated scan"
            echo "auth_cookie_file=" >> "$GITHUB_OUTPUT"
          }

      - name: Run ZAP baseline scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ steps.target.outputs.url }}
          docker_name: ghcr.io/zaproxy/zaproxy:stable
          # -a aggregate alerts  -j json output
          # -m 20 max requests (doubled from unauthenticated — more surface to cover)
          # -T 20 timeout
          # When authenticated: seed cookie so ZAP starts with /app/* in scope
          cmd_options: >-
            -a -j -m 20 -T 20
            ${{ steps.auth.outputs.auth_cookie_file && format('-z "auth.cookieFile={0}"', steps.auth.outputs.auth_cookie_file) || '' }}
          allow_issue_writing: false
          # Scheduled overnight run: report-only (fail_action false) so a new finding
          # surfaces in the artifact/log but doesn't lock the repo.
          # Manual dispatches: same — developer reviews the artifact and decides.
          fail_action: false
          artifact_name: zap-baseline-report

      - name: Write nightly status
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json, os, re, glob as globmod
          # Count HIGH alerts from ZAP JSON output if available
          high_count = None
          for f in globmod.glob("**/*.json", recursive=True):
              try:
                  data = json.load(open(f))
                  highs = [a for s in data.get("site", []) for a in s.get("alerts", []) if a.get("riskcode") == "3"]
                  high_count = len(highs)
                  break
              except Exception:
                  continue
          failed = os.environ.get("JOB_STATUS") != "success"
          status = "fail" if failed else ("warn" if high_count else "pass")
          payload = {
              "job": "zap",
              "status": status,
              "metric": {"high_count": high_count},
              "findings_url": f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}" if status != "pass" else None,
              "run_id": os.environ["GITHUB_RUN_ID"],
          }
          with open("nightly-status.json", "w") as f:
              json.dump(payload, f)
          PYEOF
        env:
          JOB_STATUS: ${{ job.status }}

      - name: Upload nightly status artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-status-zap
          path: nightly-status.json
          retention-days: 7

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/ntfy-notify
        with:
          title: "StratFlow CI — ZAP scan FAILED"
          body: "ZAP security scan failed or found HIGH severity issues. Run ${{ github.run_id }}"
          priority: urgent
          tags: "warning,ci,security,zap"
          click_url: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Promote ZAP report to zap-latest.md
        if: always()
        run: |
          REPORT=$(find . -name "*.md" -path "*/zap*" -newer security-reports/zap-latest.md 2>/dev/null | sort | tail -1)
          if [ -n "$REPORT" ]; then
            echo "<!-- ZAP run: $(date -u '+%Y-%m-%d %H:%M UTC') -->" > security-reports/zap-latest.md
            cat "$REPORT" >> security-reports/zap-latest.md
          else
            echo "<!-- ZAP run: $(date -u '+%Y-%m-%d %H:%M UTC') — report file not found at expected path -->" \
              >> security-reports/zap-latest.md
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add security-reports/zap-latest.md
          if git diff --cached --quiet; then
            echo "No changes to zap-latest.md"
          else
            git commit -m "chore: ZAP baseline report $(date -u '+%Y-%m-%d')"
            git push
          fi

  zap-full:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.scan_mode == 'full' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve and guard scan target
        id: target
        run: |
          URL="${{ inputs.target_url || vars.APP_URL_STAGING || 'https://stratflow-app-test.up.railway.app' }}"
          PROD_HOSTNAMES=("stratflow.io" "app.stratflow.io" "stratflow-app-production.up.railway.app")
          for PROD in "${PROD_HOSTNAMES[@]}"; do
            if echo "$URL" | grep -qiF "$PROD"; then
              echo "::error::ZAP full scan target '$URL' is a production hostname ($PROD). Set APP_URL_STAGING to a non-prod URL."
              exit 1
            fi
          done
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Run ZAP full scan
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          target: ${{ steps.target.outputs.url }}
          docker_name: ghcr.io/zaproxy/zaproxy:stable
          cmd_options: "-a -j -T 30"
          allow_issue_writing: false
          fail_action: false
          artifact_name: zap-full-report
