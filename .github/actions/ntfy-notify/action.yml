name: Ntfy Notify
description: Send a push notification to the configured ntfy topic

inputs:
  title:
    description: Notification title
    required: true
  body:
    description: Notification body text
    required: true
  priority:
    description: "Ntfy priority: min, low, default, high, urgent"
    required: false
    default: default
  tags:
    description: Comma-separated ntfy tags (e.g. "warning,ci")
    required: false
    default: ""
  click_url:
    description: URL to open when notification is tapped
    required: false
    default: ""
  ntfy_url:
    description: Ntfy server base URL (pass secrets.NTFY_URL from caller)
    required: false
    default: ""
  ntfy_topic:
    description: Ntfy topic name (pass secrets.NTFY_TOPIC from caller)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Send ntfy notification
      shell: bash
      env:
        NTFY_URL: ${{ inputs.ntfy_url }}
        NTFY_TOPIC: ${{ inputs.ntfy_topic }}
        TITLE: ${{ inputs.title }}
        BODY: ${{ inputs.body }}
        PRIORITY: ${{ inputs.priority }}
        TAGS: ${{ inputs.tags }}
        CLICK_URL: ${{ inputs.click_url }}
      run: |
        if [ -z "$NTFY_URL" ] || [ -z "$NTFY_TOPIC" ]; then
          echo "::warning::NTFY_URL or NTFY_TOPIC not provided — skipping notification"
          exit 0
        fi

        HEADERS=(
          -H "Title: $TITLE"
          -H "Priority: $PRIORITY"
        )

        if [ -n "$TAGS" ]; then
          HEADERS+=(-H "Tags: $TAGS")
        fi

        if [ -n "$CLICK_URL" ]; then
          HEADERS+=(-H "Click: $CLICK_URL")
        fi

        curl -fsS \
          "${HEADERS[@]}" \
          -d "$BODY" \
          "$NTFY_URL/$NTFY_TOPIC" \
          || echo "::warning::ntfy notification failed (non-fatal)"
