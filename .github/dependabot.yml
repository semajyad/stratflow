version: 2
updates:
  # Keep GitHub Actions pinned to the latest patch/minor versions.
  # PRs are created automatically; review and merge at your discretion.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"

  # Keep Composer dependencies up to date.
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "php"
    commit-message:
      prefix: "chore(deps)"
    # Allow all update types including semver-patch — patch releases frequently
    # carry CVE fixes and skipping them leaves known vulnerabilities unpatched.
